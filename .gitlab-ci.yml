# SPDX-License-Identifier: AGPL-3.0-or-later
#
# CI pipeline for quip-protocol-rs.
#
# Stages:
#   - test:      fmt / clippy / test / runtime release build on every MR
#   - build:     build the quip-network-node container per architecture
#                (amd64 + arm64), each on a native runner, on main/v0.2/tags
#   - manifest:  stitch the per-arch images into a multi-arch manifest list so
#                a single tag serves both architectures
#
# Triggers:
#   - merge_request_event  →  test
#   - push to main         →  test + build + manifest (:latest)
#   - push to v0.2         →  test + build + manifest (:v0.2)
#   - git tag              →  test + build + manifest (:<tag> + floating :<vMAJOR.MINOR>)
#
# Multi-arch: kaniko has no cross-build/manifest support — it builds for the
# native architecture of whichever runner it runs on. So each architecture has
# its own kaniko job pinned to a native runner (tags: [docker, amd64] /
# [docker, arm64]) that publishes an arch-suffixed image (:<tag>-amd64 /
# :<tag>-arm64). The `manifest` job then combines those into the real
# consumer-facing tags as a manifest list with `manifest-tool` (buildx-free).
#
# The `docker` tag is load-bearing: it pins these jobs to *container* (Docker)
# executors, which honour `image:` and can run kaniko. The fleet also has macOS
# *shell* runners that carry the bare arch tags (amd64/arm64) but ignore
# `image:` and run on the SIP-protected host — kaniko cannot run there. Every
# runner that should accept these jobs must carry `docker`: the amd64 Linux
# Docker boxes (lovelace/finney/watch) and an arm64 Docker-executor runner
# (e.g. a docker-executor gitlab-runner hosted on an Apple-Silicon Mac).
#
# Toolchain image: docker.io/carback1/rust-substrate-builder:latest
# (built manually from .gitlab/ci-toolchain.Dockerfile and pushed to Docker
# Hub — see the Dockerfile header for the buildx command). Rebuild it
# locally and re-push when the toolchain Dockerfile changes.
#
# Runtime image: registry.gitlab.com/quip.network/quip-protocol-rs/quip-network-node:<tag>

stages:
  - test
  - build
  - manifest

variables:
  TOOLCHAIN_IMAGE: docker.io/carback1/rust-substrate-builder:latest
  IMAGE: $CI_REGISTRY_IMAGE/quip-network-node
  # Tagless repository: kaniko's --cache-repo must be a bare repo, not a tag
  # ref. A ':buildcache' tag here makes kaniko reject the cache destination
  # ("repository can only contain the characters ...") and silently skip every
  # cache upload, so builds never warm. The per-arch suffix is appended in the
  # build job (-> quip-network-node-buildcache-<arch>).
  CACHE_IMAGE: $CI_REGISTRY_IMAGE/quip-network-node-buildcache
  # Keep Cargo's registry and the workspace target/ inside the project dir so
  # the GitLab CI cache can pick them up between runs.
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_TERM_COLOR: always

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "v0.2"
    - if: $CI_COMMIT_TAG

# Single test job: pulls the toolchain image once, restores the Cargo cache
# once, and runs fmt → clippy → test → runtime release build sequentially so
# they share compile artifacts and registry state. The toolchain image already
# has clang/protoc/cmake + the wasm32v1-none target.
cargo-test:
  stage: test
  image: $TOOLCHAIN_IMAGE
  tags: [docker, amd64]
  interruptible: true
  timeout: 60m
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/cache
      - .cargo/registry/index
      - target/
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --lib --bins --tests -- -D warnings
    - cargo test --workspace --lib --bins --tests
    - cargo build --release -p quip-protocol-runtime

# Shared publish rules: which branches/tags publish, and the PRIMARY_TAG each
# maps to. Referenced (not inherited) by the build jobs and the manifest job so
# all three resolve the same PRIMARY_TAG for a given pipeline.
.publish-rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        PRIMARY_TAG: latest
    - if: $CI_COMMIT_BRANCH == "v0.2"
      variables:
        PRIMARY_TAG: v0.2
    - if: $CI_COMMIT_TAG
      variables:
        PRIMARY_TAG: $CI_COMMIT_TAG

# Per-architecture container build. `needs: []` lets the kaniko jobs start as
# soon as the pipeline is created instead of waiting for `cargo-test` — the
# container build is independent of the cargo lint/test suite. Each concrete
# job below pins itself to a native runner and sets ARCH (amd64 also opts into
# the GPU-runner /lib workaround); this template holds what they share. Only
# the arch-suffixed tag
# (:<tag>-<arch>) is pushed here — the consumer-facing tags are assembled by
# the `manifest` job.
.kaniko-build:
  stage: build
  needs: []
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  timeout: 90m
  interruptible: true
  rules: !reference [.publish-rules, rules]
  before_script:
    # GPU-runner firmware workaround — amd64 only (see KANIKO_LIB_IGNORE below).
    # The amd64 builders are NVIDIA GPU hosts that bind-mount host firmware into
    # /lib, so kaniko must --ignore-path=/lib; that drops the multilib dir, so
    # recreate it for this arch's triplet. This is NOT applied on arm64: the
    # OrbStack runner has no firmware mount, and on aarch64 the ELF interpreter
    # /lib/ld-linux-aarch64.so.1 lives directly in /lib, so ignoring /lib would
    # make every `RUN` fail with `exec /bin/sh: no such file or directory`.
    - if [ -n "$KANIKO_LIB_IGNORE" ]; then mkdir -p /lib && ln -sfn /usr/lib/$TRIPLET /lib/$TRIPLET; fi
    - mkdir -p /kaniko/.docker
    - |
      printf '{"auths":{"%s":{"auth":"%s"}}}\n' \
        "$CI_REGISTRY" \
        "$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')" \
        > /kaniko/.docker/config.json
  script:
    # --cache-repo is suffixed per arch: kaniko's cache keys hash the build
    # instructions, not the target architecture, so amd64 and arm64 would
    # collide on identical keys but hold arch-incompatible layers if they
    # shared one cache repo.
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --destination "$IMAGE:$PRIMARY_TAG-$ARCH" \
        --build-arg "SUBSTRATE_CLI_GIT_COMMIT_HASH=$CI_COMMIT_SHORT_SHA" \
        --cache=true \
        --cache-repo "$CACHE_IMAGE-$ARCH" \
        $KANIKO_LIB_IGNORE \
        $KANIKO_EXTRA

kaniko-build-amd64:
  extends: .kaniko-build
  tags: [docker, amd64]
  variables:
    ARCH: amd64
    # GPU runners bind-mount firmware into /lib; ignore it + shim the multilib
    # dir (TRIPLET). arm64 deliberately sets neither — see the before_script.
    TRIPLET: x86_64-linux-gnu
    KANIKO_LIB_IGNORE: "--ignore-path=/lib"

kaniko-build-arm64:
  extends: .kaniko-build
  tags: [docker, arm64]
  variables:
    ARCH: arm64
    # The arm64 runner is a docker-executor on an Apple-Silicon Mac (OrbStack),
    # a far more memory/disk-constrained VM than the amd64 Linux boxes. kaniko's
    # default --compressed-caching=true holds compressed layers in RAM while
    # snapshotting the multi-GB Rust builder rootfs, which OOM-freezes the whole
    # VM (docker daemon hangs) right at "Taking snapshot of full filesystem".
    # Disable it so layers stream to disk instead of accumulating in memory.
    KANIKO_EXTRA: "--compressed-caching=false"

# Combine the per-arch images into a multi-arch manifest list. manifest-tool
# replaces the literal `ARCH` token in --template with each platform's arch
# (amd64 / arm64), matching the arch-suffixed tags the build jobs pushed, and
# stamps the assembled index with the consumer-facing tags: PRIMARY_TAG, the
# commit-sha tag, and (on release tags) the floating minor-series tag
# (e.g. v0.2.0rc1 → :v0.2). kaniko's debug image ships busybox sh/grep with -oE.
manifest:
  stage: manifest
  needs: [kaniko-build-amd64, kaniko-build-arm64]
  image:
    name: mplatform/manifest-tool:alpine
    entrypoint: [""]
  tags: [docker, amd64]
  interruptible: true
  rules: !reference [.publish-rules, rules]
  script:
    - |
      ADDL_TAGS="sha-$CI_COMMIT_SHORT_SHA"
      if [ -n "$CI_COMMIT_TAG" ]; then
        SERIES_TAG=$(printf '%s' "$CI_COMMIT_TAG" | grep -oE '^v[0-9]+\.[0-9]+' || true)
        [ -n "$SERIES_TAG" ] && ADDL_TAGS="$ADDL_TAGS,$SERIES_TAG"
      fi
      manifest-tool \
        --username "$CI_REGISTRY_USER" \
        --password "$CI_REGISTRY_PASSWORD" \
        push from-args \
        --platforms linux/amd64,linux/arm64 \
        --template "$IMAGE:$PRIMARY_TAG-ARCH" \
        --target "$IMAGE:$PRIMARY_TAG" \
        --tags "$ADDL_TAGS"
