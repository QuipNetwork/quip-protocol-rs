# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Build the quip-network-node Docker image and push to GitLab Container Registry.
#
# Triggers:
#   - push to main  →  :latest         + :sha-<short>
#   - push to v0.2  →  :v0.2-preview   + :sha-<short>   (release integration branch)
#   - git tag       →  :<tag>          + :sha-<short>   (no :latest — main is the floating ref)
#
# Image: registry.gitlab.com/quip.network/quip-protocol-rs/quip-network-node:<tag>
#
# Caching: Kaniko registry-side cache image (:buildcache). This reuses built
# layers across CI runs without Docker-in-Docker.
#
# Context: QUI-528.

stages:
  - build

variables:
  IMAGE: $CI_REGISTRY_IMAGE/quip-network-node
  CACHE_IMAGE: $CI_REGISTRY_IMAGE/quip-network-node:buildcache

kaniko-build-push:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags: [linux, amd64]
  timeout: 90m
  interruptible: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        PRIMARY_TAG: latest
    - if: $CI_COMMIT_BRANCH == "v0.2"
      variables:
        PRIMARY_TAG: v0.2-preview
    - if: $CI_COMMIT_TAG
      variables:
        PRIMARY_TAG: $CI_COMMIT_TAG
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      printf '{"auths":{"%s":{"auth":"%s"}}}\n' \
        "$CI_REGISTRY" \
        "$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')" \
        > /kaniko/.docker/config.json
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --destination "$IMAGE:$PRIMARY_TAG" \
        --destination "$IMAGE:sha-$CI_COMMIT_SHORT_SHA" \
        --build-arg "SUBSTRATE_CLI_GIT_COMMIT_HASH=$CI_COMMIT_SHORT_SHA" \
        --cache=true \
        --cache-repo "$CACHE_IMAGE"
