# SPDX-License-Identifier: AGPL-3.0-or-later
#
# CI pipeline for quip-protocol-rs.
#
# Stages:
#   - test:  fmt / clippy / test / runtime release build on every MR
#   - build: publish quip-network-node container on main/v0.2/tags
#
# Triggers:
#   - merge_request_event  →  test
#   - push to main         →  test + build (:latest)
#   - push to v0.2         →  test + build (:v0.2-preview)
#   - git tag              →  test + build (:<tag> + floating :<vMAJOR.MINOR>)
#
# Toolchain image: docker.io/carback1/rust-substrate-builder:latest
# (built manually from .gitlab/ci-toolchain.Dockerfile and pushed to Docker
# Hub — see the Dockerfile header for the buildx command). Rebuild it
# locally and re-push when the toolchain Dockerfile changes.
#
# Runtime image: registry.gitlab.com/quip.network/quip-protocol-rs/quip-network-node:<tag>

stages:
  - test
  - build

variables:
  TOOLCHAIN_IMAGE: docker.io/carback1/rust-substrate-builder:latest
  IMAGE: $CI_REGISTRY_IMAGE/quip-network-node
  CACHE_IMAGE: $CI_REGISTRY_IMAGE/quip-network-node:buildcache
  # Keep Cargo's registry and the workspace target/ inside the project dir so
  # the GitLab CI cache can pick them up between runs.
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_TERM_COLOR: always

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "v0.2"
    - if: $CI_COMMIT_TAG

# Single test job: pulls the toolchain image once, restores the Cargo cache
# once, and runs fmt → clippy → test → runtime release build sequentially so
# they share compile artifacts and registry state. The toolchain image already
# has clang/protoc/cmake + the wasm32v1-none target.
cargo-test:
  stage: test
  image: $TOOLCHAIN_IMAGE
  tags: [linux, amd64]
  interruptible: true
  timeout: 60m
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/cache
      - .cargo/registry/index
      - target/
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --lib --bins --tests -- -D warnings
    - cargo test --workspace --lib --bins --tests
    - cargo build --release -p quip-protocol-runtime

# Publish the production node image. `needs: []` lets the kaniko job start
# as soon as the pipeline is created instead of waiting for `cargo-test` —
# the container build is independent of the cargo lint/test suite, so there
# is no reason to serialise the two. Stage label remains `build` so the
# pipeline UI still groups it separately from the test stage.
kaniko-build-push:
  stage: build
  needs: []
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags: [linux, amd64]
  timeout: 90m
  interruptible: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        PRIMARY_TAG: latest
    - if: $CI_COMMIT_BRANCH == "v0.2"
      variables:
        PRIMARY_TAG: v0.2-preview
    - if: $CI_COMMIT_TAG
      variables:
        PRIMARY_TAG: $CI_COMMIT_TAG
  before_script:
    # The cuda runners' NVIDIA container runtime bind-mounts host GPU driver
    # firmware into every job container at /lib/firmware/nvidia/. kaniko's
    # rootfs extraction cannot replace /lib with the usr-merge symlink while
    # those mounts are busy, so the executor runs with --ignore-path=/lib,
    # which skips that replacement and preserves /lib as a plain directory.
    # The ELF interpreter resolves through /lib/x86_64-linux-gnu (via the
    # /lib64 → /usr/lib64 → /lib/x86_64-linux-gnu symlink chain), so RUN
    # commands need this shim. It dangles until kaniko unpacks the rootfs,
    # and never reaches the image: /lib is excluded from snapshots and the
    # final image's /lib symlink comes from the base layers.
    - mkdir -p /lib && ln -sfn /usr/lib/x86_64-linux-gnu /lib/x86_64-linux-gnu
    - mkdir -p /kaniko/.docker
    - |
      printf '{"auths":{"%s":{"auth":"%s"}}}\n' \
        "$CI_REGISTRY" \
        "$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')" \
        > /kaniko/.docker/config.json
  script:
    # On tag pipelines, also publish a floating minor-series tag derived from the
    # release tag (e.g. v0.2.0rc1 → :v0.2) so deployments can pin a series and
    # pick up the latest release in it. Branch pipelines get PRIMARY_TAG + sha
    # only. kaniko's debug image ships busybox sh/grep, which supports -oE.
    # --ignore-path=/lib: see the before_script comment — paired with the
    # /lib/x86_64-linux-gnu shim created there.
    - |
      SERIES_DEST=""
      if [ -n "$CI_COMMIT_TAG" ]; then
        SERIES_TAG=$(printf '%s' "$CI_COMMIT_TAG" | grep -oE '^v[0-9]+\.[0-9]+' || true)
        [ -n "$SERIES_TAG" ] && SERIES_DEST="--destination=$IMAGE:$SERIES_TAG"
      fi
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --destination "$IMAGE:$PRIMARY_TAG" \
        --destination "$IMAGE:sha-$CI_COMMIT_SHORT_SHA" \
        $SERIES_DEST \
        --build-arg "SUBSTRATE_CLI_GIT_COMMIT_HASH=$CI_COMMIT_SHORT_SHA" \
        --cache=true \
        --cache-repo "$CACHE_IMAGE" \
        --ignore-path=/lib
