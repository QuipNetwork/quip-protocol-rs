# SPDX-License-Identifier: AGPL-3.0-or-later
#
# CI pipeline for quip-protocol-rs.
#
# Stages:
#   - ci-image: rebuild the CI toolchain image when its Dockerfile changes
#   - check:    fmt / clippy / test / runtime release build on every MR
#   - build:    publish quip-network-node container on main/v0.2/tags
#
# Triggers:
#   - merge_request_event  →  check
#   - push to main         →  check + build (:latest)
#   - push to v0.2         →  check + build (:v0.2-preview)
#   - git tag              →  check + build (:<tag>)
#
# Toolchain image: docker.io/carback1/rust-substrate-builder:latest
# (built from .gitlab/ci-toolchain.Dockerfile; push requires DOCKERHUB_USER +
# DOCKERHUB_TOKEN CI/CD variables in GitLab project settings).
#
# Runtime image: registry.gitlab.com/quip.network/quip-protocol-rs/quip-network-node:<tag>

stages:
  - ci-image
  - check
  - build

variables:
  TOOLCHAIN_IMAGE: docker.io/carback1/rust-substrate-builder:latest
  IMAGE: $CI_REGISTRY_IMAGE/quip-network-node
  CACHE_IMAGE: $CI_REGISTRY_IMAGE/quip-network-node:buildcache
  # Keep Cargo's registry and the workspace target/ inside the project dir so
  # the GitLab CI cache can pick them up between runs.
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_TERM_COLOR: always

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "v0.2"
    - if: $CI_COMMIT_TAG

# Rebuild and push the CI toolchain image when its Dockerfile or this CI
# config changes. Also allowed as a manual trigger from the GitLab UI for
# rebuilds without a code change (e.g. base-image security patches).
ci-toolchain-image:
  stage: ci-image
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags: [linux, amd64]
  timeout: 30m
  interruptible: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - .gitlab/ci-toolchain.Dockerfile
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - .gitlab/ci-toolchain.Dockerfile
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "v0.2"
      changes:
        - .gitlab/ci-toolchain.Dockerfile
        - .gitlab-ci.yml
    - when: manual
      allow_failure: true
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}\n' \
        "$(printf '%s:%s' "$DOCKERHUB_USER" "$DOCKERHUB_TOKEN" | base64 | tr -d '\n')" \
        > /kaniko/.docker/config.json
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/.gitlab/ci-toolchain.Dockerfile" \
        --destination "$TOOLCHAIN_IMAGE" \
        --cache=true

# Shared template for cargo-driven jobs. Each job pulls the toolchain image
# (which already has clang/protoc/cmake + the wasm32v1-none target) and
# caches Cargo's registry + target dir between runs.
.cargo-job:
  stage: check
  image: $TOOLCHAIN_IMAGE
  tags: [linux, amd64]
  interruptible: true
  timeout: 60m
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/cache
      - .cargo/registry/index
      - target/

cargo-fmt:
  extends: .cargo-job
  script:
    - cargo fmt --all -- --check

cargo-clippy:
  extends: .cargo-job
  script:
    - cargo clippy --workspace --lib --bins --tests -- -D warnings

cargo-test:
  extends: .cargo-job
  script:
    - cargo test --workspace --lib --bins --tests

cargo-build-runtime:
  extends: .cargo-job
  script:
    - cargo build --release -p quip-protocol-runtime

# Publish the production node image. Unchanged from the prior pipeline
# except for the explicit `stage: build` (was implicit) and the rule on v0.2
# which now coexists with the check stage that runs on the same push.
kaniko-build-push:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags: [linux, amd64]
  timeout: 90m
  interruptible: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        PRIMARY_TAG: latest
    - if: $CI_COMMIT_BRANCH == "v0.2"
      variables:
        PRIMARY_TAG: v0.2-preview
    - if: $CI_COMMIT_TAG
      variables:
        PRIMARY_TAG: $CI_COMMIT_TAG
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      printf '{"auths":{"%s":{"auth":"%s"}}}\n' \
        "$CI_REGISTRY" \
        "$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')" \
        > /kaniko/.docker/config.json
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --destination "$IMAGE:$PRIMARY_TAG" \
        --destination "$IMAGE:sha-$CI_COMMIT_SHORT_SHA" \
        --build-arg "SUBSTRATE_CLI_GIT_COMMIT_HASH=$CI_COMMIT_SHORT_SHA" \
        --cache=true \
        --cache-repo "$CACHE_IMAGE"
