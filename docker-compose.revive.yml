# Single-validator pallet-revive development stack.
#
# The node runtime is built with EIP-155 Chain ID 1337. The sidecar is built
# from the exact Polkadot SDK revision pinned by this repository and exposes
# Ethereum JSON-RPC on localhost:8545. Subscan Essentials consumes both the
# native and Ethereum endpoints, exposes its API on localhost:4399, and serves
# its explorer UI on localhost:3000.
name: quip-revive-dev

x-subscan-environment: &subscan-environment
  DB_DRIVER: mysql
  MYSQL_HOST: subscan-db
  MYSQL_PORT: "3306"
  MYSQL_USER: root
  MYSQL_PASS: subscan
  MYSQL_DB: subscan
  REDIS_HOST: subscan-redis
  REDIS_PORT: "6379"
  CHAIN_WS_ENDPOINT: ws://node:9944
  ETH_RPC: http://eth-rpc:8545
  NETWORK_NODE: quip-dev
  SUBSTRATE_ADDRESS_TYPE: "42"
  SUBSTRATE_ACCURACY: "12"
  WORKER_GOROUTINE_COUNT: "4"

services:
  node:
    build:
      context: .
      args:
        NODE_BUILD_FEATURES: dev-chain-id
    image: quip-network-node:revive-dev
    restart: unless-stopped
    volumes:
      - revive-node-data:/data
    ports:
      - "${QUIP_NODE_RPC_PORT:-9944}:9944"
    command:
      - --dev
      - --base-path=/data
      # Subscan backfills storage/events from genesis. Pruned state cannot
      # satisfy those historical state_getStorage requests.
      - --state-pruning=archive
      - --blocks-pruning=archive
      - --rpc-port=9944
      - --unsafe-rpc-external
      - --rpc-methods=unsafe
      - --rpc-cors=all

  eth-rpc:
    build:
      context: .
      dockerfile: docker/revive-eth-rpc.Dockerfile
      args:
        POLKADOT_SDK_REPOSITORY: https://github.com/QuipNetwork/polkadot-sdk.git
        POLKADOT_SDK_REV: 4330574c320bccf82ac254514e95657fb5b4601e
    image: quip-revive-eth-rpc:4330574c
    restart: unless-stopped
    depends_on:
      node:
        condition: service_started
    ports:
      - "${QUIP_ETH_RPC_PORT:-8545}:8545"
    command:
      - --dev
      - --node-rpc-url=ws://node:9944
      - --eth-pruning=256
      - --rpc-port=8545
      - --unsafe-rpc-external
      - --rpc-methods=unsafe
      - --rpc-cors=all
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl --fail --silent --show-error
          --header 'content-type: application/json'
          --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}'
          http://127.0.0.1:8545 | grep --quiet '"result":"0x539"'
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  subscan-db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: subscan
      MYSQL_ROOT_PASSWORD: subscan
      MYSQL_ROOT_HOST: "%"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - subscan-db-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping --host=127.0.0.1 --user=root --password="$$MYSQL_ROOT_PASSWORD" --silent
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s

  subscan-redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - subscan-redis-data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 5s
      retries: 30

  subscan-api:
    build:
      context: .
      dockerfile: docker/subscan-essentials.Dockerfile
      args:
        SUBSCAN_REPOSITORY: https://github.com/subscan-explorer/subscan-essentials.git
        SUBSCAN_REV: bcb39fbd30ea3017635021f0eb1c87f6f9fd7bff
    image: quip-subscan-essentials:bcb39fbd
    restart: unless-stopped
    environment: *subscan-environment
    depends_on:
      eth-rpc:
        condition: service_healthy
      subscan-db:
        condition: service_healthy
      subscan-redis:
        condition: service_healthy
    ports:
      - "${QUIP_SUBSCAN_API_PORT:-4399}:4399"
    healthcheck:
      test: [CMD, wget, --quiet, --spider, http://127.0.0.1:4399/healthz]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  subscan-ui:
    build:
      context: .
      dockerfile: docker/subscan-ui.Dockerfile
      args:
        SUBSCAN_UI_REPOSITORY: https://github.com/subscan-explorer/subscan-essentials-ui-react.git
        SUBSCAN_UI_REV: 9f29809fe463fdc5840a9b407cca58c574621c1d
        NEXT_PUBLIC_API_HOST: http://localhost:${QUIP_SUBSCAN_API_PORT:-4399}
    image: quip-subscan-essentials-ui:9f29809f
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_HOST: http://localhost:${QUIP_SUBSCAN_API_PORT:-4399}
    depends_on:
      subscan-api:
        condition: service_healthy
    ports:
      - "${QUIP_SUBSCAN_UI_PORT:-3000}:3000"
    healthcheck:
      test: [CMD, wget, --quiet, --spider, http://127.0.0.1:3000/]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  subscan-observer:
    image: quip-subscan-essentials:bcb39fbd
    restart: unless-stopped
    environment: *subscan-environment
    command: [start, subscribe]
    depends_on:
      subscan-api:
        condition: service_healthy

  subscan-worker:
    image: quip-subscan-essentials:bcb39fbd
    restart: unless-stopped
    environment: *subscan-environment
    command: [start, worker]
    depends_on:
      subscan-api:
        condition: service_healthy

volumes:
  revive-node-data:
  subscan-db-data:
  subscan-redis-data:
