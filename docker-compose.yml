# Local dev only. Three Aura validators (Alice/Bob/Charlie) peer over the
# default compose bridge by container DNS name.
#
# Three flags fix a libp2p decryption-error loop seen on macOS Docker:
#   --public-addr=/dns4/nodeN/tcp/30333  pins identify advertisement to the
#       docker DNS name, instead of letting --listen-addr=0.0.0.0 enumerate
#       every interface (including each container's own 127.0.0.1, which
#       peers would dial back into themselves).
#   --no-mdns  prevents multicast discovery from injecting more candidate
#       addresses; we have explicit --bootnodes, so mDNS is pure noise here.
#   no host port mappings for 30333 — peering happens entirely inside the
#       docker network. Only RPC (9944/5/6) and Prometheus (9615/6/7) are
#       exposed to the host for debugging.
services:
  node1:
    build: .
    image: quip-network-node:local
    container_name: quip-node1
    restart: unless-stopped
    volumes:
      - node1-data:/data
    ports:
      - "9944:9944"
      - "9615:9615"
    command:
      - --chain=local3
      - --base-path=/data
      - --node-key=000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
      - --listen-addr=/ip4/0.0.0.0/tcp/30333
      - --public-addr=/dns4/node1/tcp/30333
      - --no-mdns
      - --rpc-port=9944
      - --unsafe-rpc-external
      - --rpc-cors=all
      - --prometheus-port=9615
      - --prometheus-external
      - --alice
      - --validator

  node2:
    image: quip-network-node:local
    container_name: quip-node2
    restart: unless-stopped
    depends_on:
      - node1
    volumes:
      - node2-data:/data
    ports:
      - "9945:9944"
      - "9616:9615"
    command:
      - --chain=local3
      - --base-path=/data
      - --node-key=1f1e1d1c1b1a191817161514131211100f0e0d0c0b0a09080706050403020100
      - --listen-addr=/ip4/0.0.0.0/tcp/30333
      - --public-addr=/dns4/node2/tcp/30333
      - --no-mdns
      - --rpc-port=9944
      - --unsafe-rpc-external
      - --rpc-cors=all
      - --prometheus-port=9615
      - --prometheus-external
      - --bootnodes=/dns/node1/tcp/30333/p2p/12D3KooWA4Xop1JaT3MHxwYMkCepYsv4iPVopMXwCz5iHYdBfeSB
      - --bob
      - --validator

  node3:
    image: quip-network-node:local
    container_name: quip-node3
    restart: unless-stopped
    depends_on:
      - node1
    volumes:
      - node3-data:/data
    ports:
      - "9946:9944"
      - "9617:9615"
    command:
      - --chain=local3
      - --base-path=/data
      - --node-key=f0e1d2c3b4a5968778695a4b3c2d1e0ff1e2d3c4b5a69788796a5b4c3d2e1f00
      - --listen-addr=/ip4/0.0.0.0/tcp/30333
      - --public-addr=/dns4/node3/tcp/30333
      - --no-mdns
      - --rpc-port=9944
      - --unsafe-rpc-external
      - --rpc-cors=all
      - --prometheus-port=9615
      - --prometheus-external
      - --bootnodes=/dns/node1/tcp/30333/p2p/12D3KooWA4Xop1JaT3MHxwYMkCepYsv4iPVopMXwCz5iHYdBfeSB
      - --charlie
      - --validator

volumes:
  node1-data:
  node2-data:
  node3-data:
